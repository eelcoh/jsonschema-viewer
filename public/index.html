<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JSON Schema Viewer</title>
    <link rel="icon" href="favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div id="root"></div>
    <script src="elm.js"></script>
    <script>
        var app = Elm.Main.init({ node: document.getElementById('root') });

        // ---- SVG download -------------------------------------------------
        // The on-screen SVG is rendered with the dark blueprint palette. For
        // export we swap every matching fill/stroke to its light counterpart
        // and prepend a white background rect so the file reads correctly
        // in viewers that assume transparency.
        var SVG_NS = 'http://www.w3.org/2000/svg';
        var COLOR_ATTRS = ['fill', 'stroke'];

        app.ports.downloadSvg.subscribe(function (args) {
            var svg = document.getElementById('schema-svg');
            if (!svg) return;
            var clone = svg.cloneNode(true);
            clone.setAttribute('xmlns', SVG_NS);
            clone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');

            var substitutions = {};
            (args.colorMap || []).forEach(function (pair) {
                substitutions[pair[0]] = pair[1];
            });

            var nodes = clone.querySelectorAll('*');
            for (var i = 0; i < nodes.length; i++) {
                var el = nodes[i];
                for (var a = 0; a < COLOR_ATTRS.length; a++) {
                    var attr = COLOR_ATTRS[a];
                    var val = el.getAttribute(attr);
                    if (val && Object.prototype.hasOwnProperty.call(substitutions, val)) {
                        el.setAttribute(attr, substitutions[val]);
                    }
                }
            }

            var vb = (clone.getAttribute('viewBox') || '').split(/\s+/);
            if (vb.length === 4) {
                var bg = document.createElementNS(SVG_NS, 'rect');
                bg.setAttribute('x', vb[0]);
                bg.setAttribute('y', vb[1]);
                bg.setAttribute('width', vb[2]);
                bg.setAttribute('height', vb[3]);
                bg.setAttribute('fill', args.bgColor || '#ffffff');
                clone.insertBefore(bg, clone.firstChild);
            }

            var serialized = new XMLSerializer().serializeToString(clone);
            var payload = '<?xml version="1.0" encoding="UTF-8"?>\n' + serialized;
            var blob = new Blob([payload], { type: 'image/svg+xml;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = args.filename || 'schema.svg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // ---- Tab / Shift-Tab handling in the schema editor ---------------
        // Intercepts Tab/Shift-Tab in .schema-textarea, mutates the value in
        // place, then dispatches a synthetic `input` event so Elm's onInput
        // picks up the new text via its normal update cycle.
        var INDENT = '  ';

        document.addEventListener('keydown', function (e) {
            if (e.key !== 'Tab') return;
            var ta = e.target;
            if (!ta || !ta.classList || !ta.classList.contains('schema-textarea')) return;
            e.preventDefault();

            var start = ta.selectionStart;
            var end = ta.selectionEnd;
            var value = ta.value;

            if (!e.shiftKey && start === end) {
                ta.setRangeText(INDENT, start, end, 'end');
                ta.dispatchEvent(new Event('input', { bubbles: true }));
                return;
            }

            // Line-based operation: work on every line the selection touches.
            var lineStart = value.lastIndexOf('\n', start - 1) + 1;
            // If the selection ends right at a line break, don't pull the
            // next (untouched) line into the operation.
            var effectiveEnd = (end > start && value.charAt(end - 1) === '\n') ? end - 1 : end;
            var nextNL = value.indexOf('\n', effectiveEnd);
            var lineEnd = nextNL === -1 ? value.length : nextNL;

            var block = value.substring(lineStart, lineEnd);
            var lines = block.split('\n');
            var firstDelta = 0;
            var totalDelta = 0;
            var newLines;

            if (e.shiftKey) {
                newLines = lines.map(function (line, i) {
                    var removed = 0;
                    if (line.startsWith(INDENT)) removed = INDENT.length;
                    else if (line.charAt(0) === ' ' || line.charAt(0) === '\t') removed = 1;
                    if (i === 0) firstDelta = -removed;
                    totalDelta -= removed;
                    return line.substring(removed);
                });
            } else {
                newLines = lines.map(function (line, i) {
                    if (i === 0) firstDelta = INDENT.length;
                    totalDelta += INDENT.length;
                    return INDENT + line;
                });
            }

            ta.setRangeText(newLines.join('\n'), lineStart, lineEnd, 'preserve');
            var newStart = Math.max(lineStart, start + firstDelta);
            var newEnd = Math.max(newStart, end + totalDelta);
            ta.setSelectionRange(newStart, newEnd);
            ta.dispatchEvent(new Event('input', { bubbles: true }));
        });
    </script>
</body>
</html>
